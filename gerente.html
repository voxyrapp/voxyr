<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nexo - Painel do Gerente</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Nexpro">
  <link rel="apple-touch-icon" href="/icon-192.png">
</head>
<body class="h-screen flex overflow-hidden bg-gray-100">
  <style>
    .module-container { display:flex; flex-direction:column; flex:1; overflow:hidden; }
    .subtab-btn {
      display:flex; align-items:center; gap:8px; padding:10px 20px;
      border:1px solid #e5e7eb; border-radius:8px; background:white;
      font-size:12px; font-weight:800; color:#6b7280; text-transform:uppercase;
    }
    .subtab-btn.active { background:#10b981; color:white; border-color:#10b981; }
  </style>

  <aside class="w-64 bg-gray-900 text-white flex flex-col shrink-0">
    <div class="p-6 text-xl font-bold border-b border-gray-800 text-emerald-400">NEXO GERENTE</div>
    <nav class="flex-1 p-4 space-y-2">
      <button class="nav-btn w-full text-left px-4 py-3 rounded bg-gray-800 text-emerald-400 border-l-4 border-emerald-400 font-bold" data-tab="reservas">📋 Reservas do dia</button>
      <button class="nav-btn w-full text-left px-4 py-3 rounded text-gray-400 hover:bg-gray-800 hover:text-white transition-colors font-bold border-l-4 border-transparent" data-tab="atribuir">📦 Atribuir pedidos</button>
      <button class="nav-btn w-full text-left px-4 py-3 rounded text-gray-400 hover:bg-gray-800 hover:text-white transition-colors font-bold border-l-4 border-transparent" data-tab="pedidos">🧾 Pedidos</button>
      <button id="btn-logout" class="w-full text-left px-4 py-3 rounded text-gray-400 hover:bg-gray-800 hover:text-white transition-colors font-bold border-l-4 border-transparent">🚪 Sair</button>
    </nav>
  </aside>

  <main class="flex-1 flex flex-col overflow-hidden">
    <div class="module-container bg-gray-50">
      <header class="bg-white border-b shrink-0">
        <div class="h-16 flex items-center px-8 justify-between">
          <div>
            <h2 class="text-xl font-semibold text-gray-800">Gestão Operacional</h2>
            <p id="mgr-subtitle" class="text-xs text-gray-500">Carregando...</p>
          </div>
          <div class="flex gap-2">
            <button id="btn-refresh" class="px-4 py-2 rounded-lg bg-gray-200 text-gray-800 text-sm font-bold hover:bg-gray-300">Atualizar</button>
          </div>
        </div>

        <div class="px-8 pb-4">
          <div class="bg-gray-50 border rounded-2xl p-4">
            <div class="flex flex-col lg:flex-row lg:items-end gap-4">
              <div class="flex-1 min-w-0">
                <label class="text-[11px] font-black uppercase text-slate-500">Filtro geral de lojas</label>
                <div class="relative mt-1" id="global-store-filter-wrap">
                  <button id="global-store-filter-btn" type="button" class="w-full border rounded-xl bg-white px-4 py-3 text-left text-sm flex items-center justify-between gap-3">
                    <span id="global-store-filter-label" class="truncate text-slate-700">Todas as minhas lojas</span>
                    <span class="text-slate-400 text-xs font-bold">▼</span>
                  </button>

                  <div id="global-store-filter-panel" class="hidden absolute z-30 mt-2 w-full rounded-2xl border bg-white shadow-xl p-3">
                    <input id="global-store-filter-search" type="text" placeholder="Digite o nome da loja..." class="w-full border rounded-xl px-3 py-2 text-sm mb-3">

                    <label class="flex items-center gap-3 px-2 py-2 rounded-lg hover:bg-slate-50 border-b mb-2">
                      <input id="global-store-all" type="checkbox" class="scale-110">
                      <span class="text-sm font-black text-slate-800">Todas</span>
                    </label>

                    <div id="global-store-options" class="max-h-64 overflow-auto space-y-1"></div>

                    <div class="flex gap-2 mt-3 pt-3 border-t">
                      <button id="global-store-apply" type="button" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-black uppercase text-xs py-3 rounded-xl">Aplicar</button>
                      <button id="global-store-close" type="button" class="px-4 bg-slate-200 hover:bg-slate-300 text-slate-800 font-black uppercase text-xs py-3 rounded-xl">Fechar</button>
                    </div>
                  </div>
                </div>
              </div>

              <div class="lg:w-auto">
                <button id="global-store-clear" type="button" class="w-full lg:w-auto px-4 py-3 rounded-xl bg-slate-200 hover:bg-slate-300 text-slate-800 font-black uppercase text-xs">Limpar filtro geral</button>
              </div>
            </div>
          </div>
        </div>
      </header>

      <div class="px-8 py-6 flex gap-3 overflow-x-auto shrink-0 bg-white border-b">
        <button class="tab-btn subtab-btn active" data-tab="reservas">📋 Reservas do dia</button>
        <button class="tab-btn subtab-btn" data-tab="atribuir">📦 Atribuir pedidos</button>
        <button class="tab-btn subtab-btn" data-tab="pedidos">🧾 Pedidos</button>
      </div>

      <div id="view" class="flex-1 overflow-y-auto p-8"></div>
    </div>
  </main>

  <div id="codeModal" class="fixed inset-0 hidden items-center justify-center bg-black/60 p-4">
    <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl">
      <h3 id="codeTitle" class="text-lg font-black uppercase text-slate-900 mb-2">Código</h3>
      <div class="p-4 rounded-2xl bg-slate-900 text-white text-center text-4xl font-black tracking-widest" id="codeValue">------</div>
      <div id="codeQr" class="mt-4 flex justify-center"></div>
      <p class="text-xs text-slate-500 mt-3">Expira em: <span id="codeExpires" class="font-black"></span></p>
      <button id="closeCodeModal" class="mt-5 w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black uppercase text-xs py-3 rounded-xl">Fechar</button>
    </div>
  </div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  const SUPABASE_URL = 'https://peluzcmwjbqodtjjxddy.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_TUX4DzHCvQkMJHNaoTfCTQ_GIHApIAC';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const view = document.getElementById('view');
  const subtitle = document.getElementById('mgr-subtitle');

  const codeModal = document.getElementById('codeModal');
  const codeTitle = document.getElementById('codeTitle');
  const codeValue = document.getElementById('codeValue');
  const codeExpires = document.getElementById('codeExpires');
  document.getElementById('closeCodeModal').onclick = () => {
    codeModal.classList.add('hidden');
    codeModal.classList.remove('flex');
  };

  const todayISO = () => {
    const d = new Date();
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    return `${yyyy}-${mm}-${dd}`;
  };

  let session = null;
  let me = null;
  let access = [];
  let storeIds = [];
  let currentTab = 'reservas';
  let perms = { can_assign_orders:false, can_generate_checkin_code:false, can_generate_checkout_code:false };
  let currentResFilter = 'all';
  let selectedGlobalStoreIds = [];

  function activeStoreIds(){
    return (selectedGlobalStoreIds && selectedGlobalStoreIds.length)
      ? selectedGlobalStoreIds.slice()
      : storeIds.slice();
  }

  function setActiveTab(tab){
    currentTab = tab;

    document.querySelectorAll('.tab-btn').forEach(b => {
      if (b.dataset.tab === tab) {
        b.className = 'tab-btn subtab-btn active';
      } else {
        b.className = 'tab-btn subtab-btn';
      }
    });

    document.querySelectorAll('.nav-btn').forEach(b => {
      if (b.dataset.tab === tab) {
        b.className = 'nav-btn w-full text-left px-4 py-3 rounded bg-gray-800 text-emerald-400 border-l-4 border-emerald-400 font-bold';
      } else {
        b.className = 'nav-btn w-full text-left px-4 py-3 rounded text-gray-400 hover:bg-gray-800 hover:text-white transition-colors font-bold border-l-4 border-transparent';
      }
    });
  }

  function parseTime(dateISO, hhmm){
    if (!dateISO || !hhmm) return null;
    const [h,m] = String(hhmm).split(':');
    return new Date(`${dateISO}T${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:00`);
  }

  function normStatus(s){
    const v = (s || '').toString().toLowerCase().trim();
    if (['em_andamento','em andamento','check-in','checkin','checking','check-in ativo','check_in'].includes(v)) return 'present';
    if (['pausa','pause','paused'].includes(v)) return 'paused';
    if (['confirmada','confirmado','confirmed','confirm'].includes(v)) return 'to_arrive';
    if (['check-out','checkout','checked_out','check_out','finalizado','finalizada','completed','done'].includes(v)) return 'done';
    return v;
  }

  function nameOf(p){
    return p?.full_name || p?.fullname || p?.fullName || p?.email || 'Autônomo';
  }

  function escapeHtml(v){
    return String(v ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function refreshGlobalStoreLabel(){
    const label = document.getElementById('global-store-filter-label');
    const total = storeIds.length;
    const active = activeStoreIds();

    if (!total || active.length === total) {
      label.textContent = 'Todas as minhas lojas';
      return;
    }

    const names = access
      .filter(a => active.includes(a.store_id))
      .map(a => a.stores?.name)
      .filter(Boolean);

    label.textContent = names.length ? names.join(', ') : 'Filtro geral aplicado';
  }

  function renderGlobalStoreOptions(searchTerm = ''){
    const host = document.getElementById('global-store-options');
    const allBox = document.getElementById('global-store-all');
    const active = activeStoreIds();
    const q = (searchTerm || '').trim().toLowerCase();

    const filtered = access.filter(a => {
      const nm = (a.stores?.name || '').toLowerCase();
      return !q || nm.includes(q);
    });

    host.innerHTML = filtered.map(a => {
      const checked = active.includes(a.store_id) ? 'checked' : '';
      return `
        <label class="flex items-center gap-3 px-2 py-2 rounded-lg hover:bg-slate-50">
          <input type="checkbox" class="global-store-item scale-110" value="${a.store_id}" ${checked}>
          <span class="text-sm text-slate-800">${escapeHtml(a.stores?.name || 'Loja')}</span>
        </label>
      `;
    }).join('') || '<div class="text-sm text-slate-500 italic px-2 py-3">Nenhuma loja encontrada.</div>';

    allBox.checked = active.length === storeIds.length;
  }

  function openGlobalStorePanel(){
    document.getElementById('global-store-filter-panel').classList.remove('hidden');
    renderGlobalStoreOptions(document.getElementById('global-store-filter-search').value || '');
  }

  function closeGlobalStorePanel(){
    document.getElementById('global-store-filter-panel').classList.add('hidden');
  }

  async function rerenderCurrentTab(){
    if (currentTab === 'reservas') return renderReservas();
    if (currentTab === 'atribuir') return renderAtribuir();
    if (currentTab === 'pedidos') return renderPedidos();
    return renderReservas();
  }

  function setupGlobalStoreFilter(){
    refreshGlobalStoreLabel();
    renderGlobalStoreOptions('');

    const wrap = document.getElementById('global-store-filter-wrap');
    const btn = document.getElementById('global-store-filter-btn');
    const panel = document.getElementById('global-store-filter-panel');
    const search = document.getElementById('global-store-filter-search');
    const allBox = document.getElementById('global-store-all');

    btn.onclick = () => {
      if (panel.classList.contains('hidden')) openGlobalStorePanel();
      else closeGlobalStorePanel();
    };

    document.getElementById('global-store-close').onclick = closeGlobalStorePanel;

    search.oninput = () => renderGlobalStoreOptions(search.value || '');

    allBox.onchange = () => {
      const checks = Array.from(document.querySelectorAll('.global-store-item'));
      checks.forEach(c => { c.checked = allBox.checked; });
    };

    document.getElementById('global-store-apply').onclick = async () => {
      const checked = Array.from(document.querySelectorAll('.global-store-item:checked')).map(x => x.value);
      selectedGlobalStoreIds = checked.length ? checked : [];
      refreshGlobalStoreLabel();
      closeGlobalStorePanel();
      await rerenderCurrentTab();
    };

    document.getElementById('global-store-clear').onclick = async () => {
      selectedGlobalStoreIds = [];
      search.value = '';
      refreshGlobalStoreLabel();
      renderGlobalStoreOptions('');
      await rerenderCurrentTab();
    };

    document.addEventListener('click', (ev) => {
      if (!wrap.contains(ev.target)) closeGlobalStorePanel();
    });
  }

  async function boot(){
    const out = await sb.auth.getSession();
    session = out.data.session;
    if (!session) return window.location.href = '/index.html';
    me = session.user;

    let mp = null;
    let mpErr = null;

    ({ data: mp, error: mpErr } = await sb
      .from('manager_profiles')
      .select('manager_id,is_active')
      .eq('manager_id', me.id)
      .single());

    if (mpErr || !mp) {
      ({ data: mp, error: mpErr } = await sb
        .from('manager_profiles')
        .select('id,is_active')
        .eq('id', me.id)
        .single());
    }

    if (mpErr || !mp || mp.is_active === false) {
  alert('Seu acesso de gerente está inativo ou não existe.');
  try {
    await sb.auth.signOut();
  } catch (_) {}
  return window.location.href = '/index.html';
}

    const { data: acc, error: accErr } = await sb
      .from('manager_store_access')
      .select('store_id, can_assign_orders, can_generate_checkin_code, can_generate_checkout_code, stores:store_id(name)')
      .eq('manager_id', me.id);

    if (accErr) {
      console.error(accErr);
      alert('Erro ao carregar acessos: ' + accErr.message);
      return;
    }

    access = acc || [];
    storeIds = access.map(a => a.store_id);

    perms.can_assign_orders = access.some(a => a.can_assign_orders);
    perms.can_generate_checkin_code = access.some(a => a.can_generate_checkin_code);
    perms.can_generate_checkout_code = access.some(a => a.can_generate_checkout_code);

    const lojasTxt = access.map(a => a.stores?.name).filter(Boolean).join(', ');
    subtitle.textContent = `Logado: ${me.email} • Lojas: ${lojasTxt || 'N/A'}`;

    setupGlobalStoreFilter();
    await renderReservas();
  }

  async function fetchReservasDoDia(){
    const dia = todayISO();
    const scopedStoreIds = activeStoreIds();
    if (!scopedStoreIds.length) return [];

    const { data: slots, error: slotErr } = await sb
      .from('slots')
      .select('id, store_id, shift_id, date')
      .eq('date', dia)
      .in('store_id', scopedStoreIds);

    if (slotErr) { console.error(slotErr); throw slotErr; }
    const slotList = slots || [];
    if (!slotList.length) return [];

    const slotById = new Map(slotList.map(s => [s.id, s]));
    const slotIds = slotList.map(s => s.id);

    const shiftIds = [...new Set(slotList.map(s => s.shift_id).filter(Boolean))];
    let shiftById = new Map();
    if (shiftIds.length){
      const { data: shifts, error: shErr } = await sb
        .from('shifts')
        .select('id, name, start_time, end_time')
        .in('id', shiftIds);
      if (shErr) { console.error(shErr); throw shErr; }
      shiftById = new Map((shifts||[]).map(x => [x.id, x]));
    }

    const storeIdsUniq = [...new Set(slotList.map(s => s.store_id).filter(Boolean))];
    let storeById = new Map();
    if (storeIdsUniq.length){
      const { data: stores, error: stErr } = await sb
        .from('stores')
        .select('id, name')
        .in('id', storeIdsUniq);
      if (stErr) { console.error(stErr); throw stErr; }
      storeById = new Map((stores||[]).map(x => [x.id, x]));
    }

    let reservations = [];
    {
      let { data, error } = await sb
        .from('reservations')
        .select('id, profile_id, slot_id, vacancy_id, status, started_at, finished_at, created_at, checking_last_at')
        .in('slot_id', slotIds);

      if (error && String(error.message||'').toLowerCase().includes('slot_id')){
        const fb = await sb
          .from('reservations')
          .select('id, profile_id, slot_id, vacancy_id, status, started_at, finished_at, created_at, checking_last_at')
          .in('vacancy_id', slotIds);
        data = fb.data; error = fb.error;
      }

      if (error) { console.error(error); throw error; }
      reservations = data || [];
    }

    if (!reservations.length) return [];

    const profileIds = [...new Set(reservations.map(r => r.profile_id).filter(Boolean))];
    let profById = new Map();
    if (profileIds.length){
      const { data: profs, error: pErr } = await sb
        .from('profiles')
        .select('id, full_name, email')
        .in('id', profileIds);
      if (pErr) { console.error(pErr); throw pErr; }
      profById = new Map((profs||[]).map(p => [p.id, p]));
    }

    return reservations.map(r => {
      const sid = r.slot_id || r.vacancy_id;
      const slot = slotById.get(sid) || null;
      const shift = slot?.shift_id ? (shiftById.get(slot.shift_id) || null) : null;
      const store = slot?.store_id ? (storeById.get(slot.store_id) || null) : null;
      return {
        ...r,
        profiles: profById.get(r.profile_id) || null,
        slots: slot ? { ...slot, shift, store } : null,
      };
    });
  }

  function kpis(reservas){
    const now = Date.now();
    const tolMin = 10;
    let toArrive = 0, late = 0, paused = 0, present = 0;

    reservas.forEach(r => {
      const slot = r.slots;
      const sched = parseTime(slot?.date, (slot?.shift?.start_time || slot?.start_time));
      const schedMs = sched ? sched.getTime() : null;

      const ns = normStatus(r.status);
      if (ns === 'to_arrive') {
        toArrive++;
        if (schedMs && now > (schedMs + tolMin*60*1000)) late++;
      }
      if (ns === 'paused') paused++;
      if (ns === 'present') present++;
    });

    return { toArrive, late, paused, present };
  }

  function applyResFilter(reservas){
    const now = Date.now();
    const tolMin = 10;

    if (currentResFilter === 'all') return reservas;
    if (currentResFilter === 'to_arrive') return reservas.filter(r => normStatus(r.status) === 'to_arrive');
    if (currentResFilter === 'paused') return reservas.filter(r => normStatus(r.status) === 'paused');
    if (currentResFilter === 'present') return reservas.filter(r => normStatus(r.status) === 'present');
    if (currentResFilter === 'late') {
      return reservas.filter(r => {
        if (normStatus(r.status) !== 'to_arrive') return false;
        const slot = r.slots;
        const sched = parseTime(slot?.date, (slot?.shift?.start_time || slot?.start_time));
        const schedMs = sched ? sched.getTime() : null;
        return !!(schedMs && now > (schedMs + tolMin*60*1000));
      });
    }
    return reservas;
  }

  let codeCountdownTimer = null;

  function startCodeCountdown(expiresAtIso){
    if (codeCountdownTimer) clearInterval(codeCountdownTimer);

    const tick = () => {
      const msLeft = new Date(expiresAtIso).getTime() - Date.now();
      const secLeft = Math.max(0, Math.ceil(msLeft / 1000));
      codeExpires.textContent = `${new Date(expiresAtIso).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})} (${secLeft}s)`;
      if (secLeft <= 0) {
        clearInterval(codeCountdownTimer);
        codeCountdownTimer = null;
      }
    };

    tick();
    codeCountdownTimer = setInterval(tick, 250);
  }

  async function upsertCode(reservationId, codeType){
    const reservas = await fetchReservasDoDia();
    const res = reservas.find(x => x.id === reservationId);
    if (!res) throw new Error('Reserva não encontrada.');

    if ((codeType === 'checkin' || codeType === 'resume') && !perms.can_generate_checkin_code) {
      throw new Error('Sem permissão para gerar check-in/retomar.');
    }
    if (codeType === 'checkout' && !perms.can_generate_checkout_code) {
      throw new Error('Sem permissão para gerar check-out.');
    }
    if (codeType === 'resume' && normStatus(res.status) !== 'paused') {
      throw new Error('Retomar só está disponível quando a reserva está em PAUSA.');
    }

    const nowMs = Date.now();
    const ttlMs = 60 * 1000;

    const { data: existing, error: selErr } = await sb
      .from('reservation_codes')
      .select('id, code, expires_at')
      .eq('reservation_id', reservationId)
      .eq('code_type', codeType)
      .maybeSingle();

    if (selErr) throw selErr;

    let code = null;
    let expiresAt = null;
    const existingExpMs = existing?.expires_at ? new Date(existing.expires_at).getTime() : 0;

    if (existing && existingExpMs > nowMs) {
      code = existing.code;
      expiresAt = existing.expires_at;
    } else {
      code = String(Math.floor(100000 + Math.random()*900000));
      expiresAt = new Date(nowMs + ttlMs).toISOString();

      if (existing?.id) {
        const { error: updErr } = await sb
          .from('reservation_codes')
          .update({ code, expires_at: expiresAt, created_by: me.id })
          .eq('id', existing.id);
        if (updErr) throw updErr;
      } else {
        const { error: insErr } = await sb
          .from('reservation_codes')
          .insert({ reservation_id: reservationId, code_type: codeType, code, expires_at: expiresAt, created_by: me.id });

        if (insErr) {
          const { data: ex2, error: ex2Err } = await sb
            .from('reservation_codes')
            .select('id')
            .eq('reservation_id', reservationId)
            .eq('code_type', codeType)
            .maybeSingle();
          if (ex2Err) throw insErr;
          if (ex2?.id) {
            const { error: upd2Err } = await sb
              .from('reservation_codes')
              .update({ code, expires_at: expiresAt, created_by: me.id })
              .eq('id', ex2.id);
            if (upd2Err) throw upd2Err;
          } else {
            throw insErr;
          }
        }
      }
    }

    codeTitle.textContent =
      (codeType === 'checkin') ? 'Código de CHECK-IN' :
      (codeType === 'checkout') ? 'Código de CHECK-OUT' :
      'Código de RETOMAR PAUSA';

    const codeQr = document.getElementById('codeQr');
    codeQr.innerHTML = '';
    try {
      new QRCode(codeQr, { text: String(code), width: 220, height: 220 });
    } catch (e) {}

    codeValue.textContent = code;
    startCodeCountdown(expiresAt);
    codeModal.classList.remove('hidden');
    codeModal.classList.add('flex');
  }

  async function renderReservas(){
    setActiveTab('reservas');
    view.innerHTML = '<div class="text-center text-slate-500 italic p-10">Carregando reservas do dia...</div>';

    let reservas = [];
    try {
      reservas = await fetchReservasDoDia();

    function calcPauseFromEvents(events, nowMs){
      let closedMs = 0;
      let openStartMs = null;
      for (const ev of (events || [])) {
        const t = new Date(ev.created_at).getTime();
        if (Number.isNaN(t)) continue;
        if (ev.type === 'pause') {
          if (openStartMs == null) openStartMs = t;
        } else if (ev.type === 'resume') {
          if (openStartMs != null) {
            if (t > openStartMs) closedMs += (t - openStartMs);
            openStartMs = null;
          }
        }
      }
      const openMs = (openStartMs != null) ? Math.max(0, nowMs - openStartMs) : 0;
      return { closedMs, openStartMs, totalMs: closedMs + openMs };

          if (st === 'completed') {
            const prazo = (x.completed_on_time === null || x.completed_on_time === undefined) ? '-' : (x.completed_on_time ? 'Sim' : 'Não');
            extra = ` • Itens: ${x.items_count ?? '-'} • No prazo: ${prazo}${x.late_reason ? ' • Motivo: ' + x.late_reason : ''}`;
          }

          return `
            <div class="flex items-start justify-between gap-3 rounded-xl border p-3 bg-slate-50">
              <div>
                <div class="font-black text-slate-900">${escapeHtml(nm)}</div>
                <div class="text-xs text-slate-500">${escapeHtml(x.profiles?.email || '')}</div>
                ${extra ? `<div class="text-xs text-slate-500 mt-1">${escapeHtml(extra)}</div>` : ''}
              </div>
              <span class="text-[10px] uppercase font-black px-2 py-1 rounded-full border ${badge}">${escapeHtml(st)}</span>
            </div>
          `;
        }).join('');

        return `
          <div class="p-5 rounded-2xl border bg-white">
            <div class="flex items-start justify-between gap-3">
              <div>
                <div class="font-black text-slate-900">${escapeHtml(g.channel || 'Pedido')} • ${escapeHtml(g.order_code || '-')}</div>
                <div class="text-xs text-slate-500">${escapeHtml(loja)} • ${escapeHtml(when)}</div>
                ${g.manager_note ? `<div class="text-xs text-slate-600 mt-2"><span class="font-black">Obs:</span> ${escapeHtml(g.manager_note)}</div>` : ''}
              </div>
            </div>
            <div class="mt-3 space-y-2">${assigns || '<div class="text-slate-500 italic">Sem atribuições.</div>'}</div>
          </div>
        `;
      }).join('');
    };

    document.getElementById('mgr-orders-status').onchange = renderFilteredOrders;
    document.getElementById('mgr-orders-search').oninput = renderFilteredOrders;
    document.getElementById('mgr-orders-from').onchange = renderFilteredOrders;
    document.getElementById('mgr-orders-to').onchange = renderFilteredOrders;
    document.getElementById('mgr-orders-clear').onclick = () => {
      document.getElementById('mgr-orders-status').value = '';
      document.getElementById('mgr-orders-search').value = '';
      document.getElementById('mgr-orders-from').value = today;
      document.getElementById('mgr-orders-to').value = today;
      renderFilteredOrders();
    };

    renderFilteredOrders();
  } catch (e) {
    console.error(e);
    resultsHost.innerHTML = `<div class="p-6 text-red-600 font-bold bg-white rounded-2xl border">Erro ao carregar pedidos: ${escapeHtml(e.message || e)}</div>`;
  }
}

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const tab = btn.dataset.tab;
      if (tab === 'reservas') return renderReservas();
      if (tab === 'atribuir') return renderAtribuir();
      if (tab === 'pedidos') return renderPedidos();
    });
  });

  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const tab = btn.dataset.tab;
      if (tab === 'reservas') return renderReservas();
      if (tab === 'atribuir') return renderAtribuir();
      if (tab === 'pedidos') return renderPedidos();
    });
  });

  document.getElementById('btn-refresh').onclick = async () => rerenderCurrentTab();

  document.getElementById('btn-logout').onclick = async () => {
    await sb.auth.signOut();
    window.location.href = '/index.html';
  };

  await boot();
});
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', async () => {
      try {
        await navigator.serviceWorker.register('/sw.js');
        console.log('Service Worker registrado com sucesso');
      } catch (err) {
        console.error('Erro ao registrar Service Worker:', err);
      }
    });
  }
</script>
</body>
</html>
